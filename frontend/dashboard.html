<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="Css/style.css">

</head>

<body>

<div class="navbar">

    <div class="nav-title">
        📋 Workflow Approval
    </div>

    <div class="nav-links">

        <a href="dashboard.html">
            Dashboard
        </a>

        <a
            href="create.html"
            id="createMenu"
            style="display:none;"
        >
            Create Request
        </a>

        <a
            href="requests.html"
            id="requestMenu"
            style="display:none;"
        >
            My Requests
        </a>

        <a
            href="approvals.html"
            id="approvalMenu"
            style="display:none;"
        >
            Pending Approvals
        </a>

        <a
            href="#"
            onclick="logout()"
        >
            Logout
        </a>

    </div>

</div>

<div class="container">

    <h1 id="welcome"></h1>

    <div class="card-grid">

        <div class="dashboard-card">

            <h2>Total Requests</h2>

            <p id="total">
                0
            </p>

        </div>

        <div class="dashboard-card">

            <h2>Pending</h2>

            <p id="pending">
                0
            </p>

        </div>

        <div class="dashboard-card">

            <h2>Approved</h2>

            <p id="approved">
                0
            </p>

        </div>

        <div class="dashboard-card">

            <h2>Rejected</h2>

            <p id="rejected">
                0
            </p>

        </div>

    </div>

</div>

<script src="js/navbar.js?v=1"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
